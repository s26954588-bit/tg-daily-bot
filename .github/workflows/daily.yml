name: TG Daily Bot

on:
  # GitHub 自带 schedule 目前不可靠（新建库跑了快 24 小时一次没自己触发过），
  # 保留它当免费的"万一好了"备用，主力计划是之后配外部服务调 workflow_dispatch。
  schedule:
    - cron: '5 0,8 * * *'  # UTC 00:05 / 08:05 = 北京时间 08:05 / 16:05
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node index.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
