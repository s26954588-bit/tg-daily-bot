name: TG Daily Bot

on:
  schedule:
    - cron: '5 0,8 * * *'  # UTC 00:05 / 08:05 = 北京时间 08:05 / 16:05（错开整点高峰，避免被 GitHub 限流跳过）
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node index.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
