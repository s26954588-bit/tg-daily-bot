name: TG Daily Bot

on:
  # GitHub 自带的 schedule 触发不可靠（新建库跑了快 24 小时一次没自己触发过），
  # 改由外部定时服务（cron-job.org）调用 workflow_dispatch API 来触发，不再用 schedule。
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node index.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
